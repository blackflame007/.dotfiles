
# monitor=,1920x1080@60,0x0,1
# bitdepth must match physical monitor for screen sharing (check monitor OSD/specs; use 8 or 10)
monitor=DP-1,2560x1440@59.95,3440x0,1,bitdepth,10
monitor=DP-2,3440x1440@59.97,0x0,1,bitdepth,10
# monitor=HDMI-A-1,1920x1080@60,0x0,1
exec-once=waybar
exec-once=swaybg -o "DP-1" -i ~/.config/wallpaper/bleach_urahara.jpg
exec-once=swaybg -o "DP-2" -i ~/.config/wallpaper/monkey-d-luffy-one-piece-anime-5k-va-2560x1440.jpg
exec-once=dunst
exec-once=$HOME/.local/share/hyprload/hyprload.sh
# gsettings set org.gnome.desktop.interface gtk-theme "Arc-Dark"
# gsettings set org.gnome.desktop.wm.preferences theme "Arc-dark"
# gsettings set org.gnome.desktop.interface icon-theme "Arc-X-D"

input {

  kb_options=caps:escape
  repeat_rate=50
  repeat_delay=240
  sensitivity=1.0 # for mouse cursor

  touchpad {
        disable_while_typing=1
        natural_scroll=1
        clickfinger_behavior=1
        middle_button_emulation=0
        tap-to-click=0
    }
}


general {

    layout=master

    gaps_in=5
    gaps_out=20
    border_size=2
    # col.active_border=0xff7aacdf
    # col.active_border=0x66ee8131
    col.active_border=0xff5e81ac
    col.inactive_border=0x66333333
}

decoration {
    rounding=10
    blur {
      enabled=1
      size=3
      passes=1
    }
}

animations {
    enabled=1
    animation=windows,1,7,default
    animation=fade,1,10,default
    animation=workspaces,1,6,default
}

dwindle {
    pseudotile=0 # enable pseudotiling on dwindle
    force_split=2
    # preserve_split=1
}

master {
  new_on_top=true
}

misc {
  disable_hyprland_logo=true
  disable_splash_rendering=true
  mouse_move_enables_dpms=true
}

# example window rules
# for windows named/classed as abc and xyz
$mainMod=ALT


#windowrule=move 69 420,abc
#windowrule=size 420 69,abc
windowrule = tile on, match:class kitty
windowrule = tile on, match:class reStream
windowrule = tile on, match:class ffplay
# windowrule = opacity 0.80, match:class kitty
# windowrule = opacity 0.80, match:class kitty, match:title .*(nvim).*

windowrule = tile on, match:class librewolf
windowrule = tile on, match:class discord
windowrule = tile on, match:class spotify
windowrule = workspace 8, match:class discord
windowrule = workspace 2, match:class Google-chrome
windowrule = workspace 3, match:class Spotify
windowrule = workspace 4, match:class Steam
windowrule = workspace 9, match:class com.obsproject.Studio
# windowrule = opacity 0.90, match:class zsh
# windowrule = opacity 0.90, match:class kitty
# windowrule = opacity 1, match:class neovim
windowrule = opacity 0.80, match:class alacritty
windowrule = float on, match:class Rofi
windowrule = move 25% 40%, match:class Rofi
windowrule = size 50% 20%, match:class Rofi
windowrule = opacity 0.80, match:class Rofi
windowrule = center on, match:class Rofi
